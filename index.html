<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game Pro</title>

<style>

:root{
--bg:#eef2ff;
--card:#ffffff;
--text:#222;
}

.dark{
--bg:#121212;
--card:#1f1f1f;
--text:#fff;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
text-align:center;
transition:0.4s;
}

h1{margin-top:10px;}

.controls{margin:15px;}

button,select{
padding:8px 14px;
margin:5px;
font-size:15px;
cursor:pointer;
border-radius:6px;
border:none;
}

.game-board{
display:grid;
gap:12px;
justify-content:center;
margin-top:20px;
}

.card{
width:90px;
height:90px;
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.6s;
}

.flip{transform:rotateY(180deg);}

.front,.back{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
font-size:28px;
backface-visibility:hidden;
}

.front{
background:#6c5ce7;
color:white;
}

.back{
background:var(--card);
transform:rotateY(180deg);
}

.matched .inner{
transform:rotateY(180deg);
}

/* Victory popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-content{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
animation:popupAnim 0.5s ease;
}

.dark .popup-content{
background:#1e1e1e;
color:white;
}

@keyframes popupAnim{
from{
transform:scale(0.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

</style>
</head>

<body>

<h1>🧠 Memory Matching Game Pro</h1>

<div class="controls">

<select id="levelSelect">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="startGame()">Start Game</button>
<button onclick="restartGame()">Restart</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<h3 id="timer">Time: 60</h3>
<h3 id="moves">Moves: 0</h3>
<h3 id="best">Best Score: --</h3>

<div id="board" class="game-board"></div>

<!-- Victory popup -->

<div id="victoryPopup" class="popup">

<div class="popup-content">

<h2>🎉 Congratulations!</h2>

<p id="finalMoves"></p>
<p id="finalTime"></p>
<p id="finalBest"></p>

<button onclick="restartGame()">Play Again</button>

</div>

</div>

<!-- Sounds -->

<audio id="flipSound"
src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<audio id="matchSound"
src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<audio id="bgMusic" loop
src="https://assets.mixkit.co/active_storage/sfx/119/119-preview.mp3"></audio>

<script>

const emojis=["🍎","🍌","🍇","🍉","🍓","🥝","🍒","🍋","🍍","🥑","🍑","🥕"];

let board=document.getElementById("board");

let first=null;
let second=null;

let lock=false;

let moves=0;

let matches=0;

let timer;

let timeLeft=60;

let level="easy";

let totalPairs=0;


// Dark mode toggle

function toggleDark(){

document.body.classList.toggle("dark");

}


// Level settings

function getLevelSettings(){

level=document.getElementById("levelSelect").value;

if(level==="easy")
return {pairs:6,time:60,cols:4};

if(level==="medium")
return {pairs:8,time:90,cols:4};

return {pairs:12,time:120,cols:6};

}


// Shuffle cards

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}


// Start game

function startGame(){

document.getElementById("victoryPopup").style.display="none";

let settings=getLevelSettings();

let selected=emojis.slice(0,settings.pairs);

totalPairs=settings.pairs;

let cards=[...selected,...selected];

cards=shuffle(cards);

board.style.gridTemplateColumns=`repeat(${settings.cols},90px)`;

board.innerHTML="";

moves=0;
matches=0;

document.getElementById("moves").innerText="Moves: 0";

timeLeft=settings.time;

document.getElementById("timer").innerText="Time: "+timeLeft;

loadBestScore();

cards.forEach(symbol=>{

let card=document.createElement("div");

card.className="card";

card.dataset.symbol=symbol;

card.innerHTML=`

<div class="inner">
<div class="front">?</div>
<div class="back">${symbol}</div>
</div>

`;

card.addEventListener("click",flipCard);

board.appendChild(card);

});

clearInterval(timer);

timer=setInterval(countdown,1000);

document.getElementById("bgMusic").play();

}


// Flip card

function flipCard(){

if(lock) return;

if(this===first) return;

this.querySelector(".inner").classList.add("flip");

document.getElementById("flipSound").play();

if(!first){

first=this;

return;

}

second=this;

moves++;

document.getElementById("moves").innerText="Moves: "+moves;

checkMatch();

}


// Match logic

function checkMatch(){

if(first.dataset.symbol===second.dataset.symbol){

first.classList.add("matched");

second.classList.add("matched");

document.getElementById("matchSound").play();

matches++;

if(matches===totalPairs){

winGame();

}

reset();

}

else{

lock=true;

setTimeout(()=>{

first.querySelector(".inner").classList.remove("flip");

second.querySelector(".inner").classList.remove("flip");

reset();

},700);

}

}


// Reset selection

function reset(){

[first,second]=[null,null];

lock=false;

}


// Countdown timer

function countdown(){

timeLeft--;

document.getElementById("timer").innerText="Time: "+timeLeft;

if(timeLeft<=0){

clearInterval(timer);

alert("⏰ Time Up! Try Again");

}

}


// Victory popup logic

function winGame(){

clearInterval(timer);

saveBestScore();

document.getElementById("finalMoves").innerText=
"Moves: "+moves;

document.getElementById("finalTime").innerText=
"Time Left: "+timeLeft+" sec";

let best=localStorage.getItem(level)||"--";

document.getElementById("finalBest").innerText=
"Best Score: "+best;

document.getElementById("victoryPopup").style.display="flex";

}


// Save best score

function saveBestScore(){

let best=localStorage.getItem(level);

if(!best || moves<best){

localStorage.setItem(level,moves);

}

loadBestScore();

}


// Load best score

function loadBestScore(){

let best=localStorage.getItem(level);

document.getElementById("best").innerText=
"Best Score: "+(best||"--");

}


// Restart game

function restartGame(){

clearInterval(timer);

startGame();

}

</script>

</body>
</html>
